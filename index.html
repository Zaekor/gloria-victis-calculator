<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculatrice Gloria Victis</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Calculatrice Gloria Victis</h1>

<div class="row">
<label>Or</label>
<input id="gold" type="number" min="0" value="0">
</div>

<div class="row">
<label>Argent</label>
<input id="silver" type="number" min="0" value="0">
</div>

<div class="row">
<label>Fer</label>
<input id="iron" type="number" min="0" value="0">
</div>

<div class="row">
<label>Cuivre</label>
<input id="copper" type="number" min="0" value="0">
</div>

<div class="card">

<h2>Conversion</h2>

<p><strong id="rGold">0</strong> Or</p>
<p><strong id="rSilver">0</strong> Argent</p>
<p><strong id="rIron">0</strong> Fer</p>
<p><strong id="rCopper">0</strong> Cuivre</p>

<div class="totalCopper">
Total cuivre :
<span id="totalCopper">0</span>
</div>

</div>

<button id="saveBtn">➕ Ajouter au total</button>

<hr>

<div class="card">

<h2>Total sauvegardé</h2>

<p><strong id="sGold">0</strong> Or</p>
<p><strong id="sSilver">0</strong> Argent</p>
<p><strong id="sIron">0</strong> Fer</p>
<p><strong id="sCopper">0</strong> Cuivre</p>

<div class="totalCopper">
Total cuivre :
<span id="savedCopper">0</span>
</div>

</div>

<button id="resetBtn">🗑 Réinitialiser le total</button>

</div>

<script src="script.js"></script>

</body>
</html>
